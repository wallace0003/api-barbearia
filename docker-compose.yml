version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: barber_postgres
    restart: always

    environment:
      POSTGRES_USER: barber
      POSTGRES_PASSWORD: barber123
      POSTGRES_DB: barber_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
